<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>PB Master</title>

    <meta name="description" content="PB Pattern Dashboard">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#07090e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>
    <div class="app-container">
        <aside class="side-panel">
            <div class="status-badge" id="safety-status">
                <span id="status-text" data-t="status_wait"></span>
            </div>
            
            <div class="routine-list" id="routine-board">
                <div class="mini-rt" data-rid="1"><span data-t="rt_icon_1"></span> <b id="rt-p-1">-</b> <div class="rt-metrics"><i id="rt-h-1">0</i><em id="rt-m-1">0</em></div></div>
                <div class="mini-rt" data-rid="2"><span data-t="rt_icon_2"></span> <b id="rt-p-2">-</b> <div class="rt-metrics"><i id="rt-h-2">0</i><em id="rt-m-2">0</em></div></div>
                <div class="mini-rt" data-rid="3"><span data-t="rt_icon_3"></span> <b id="rt-p-3">-</b> <div class="rt-metrics"><i id="rt-h-3">0</i><em id="rt-m-3">0</em></div></div>
                <div class="mini-rt" data-rid="4"><span data-t="rt_icon_4"></span> <b id="rt-p-4">-</b> <div class="rt-metrics"><i id="rt-h-4">0</i><em id="rt-m-4">0</em></div></div>
                <div class="mini-rt" data-rid="5"><span data-t="rt_icon_5"></span> <b id="rt-p-5">-</b> <div class="rt-metrics"><i id="rt-h-5">0</i><em id="rt-m-5">0</em></div></div>
                <div class="mini-rt" data-rid="6"><span data-t="rt_icon_6"></span> <b id="rt-p-6">-</b> <div class="rt-metrics"><i id="rt-h-6">0</i><em id="rt-m-6">0</em></div></div>
                <div class="mini-rt" data-rid="7"><span data-t="rt_icon_7"></span> <b id="rt-p-7">-</b> <div class="rt-metrics"><i id="rt-h-7">0</i><em id="rt-m-7">0</em></div></div>
            </div>

            <div class="hud-stats">
                <div class="stat-line">ACC: <span id="overall-accuracy">0%</span></div>
                <div class="stat-line">DIRECT: <span id="step1-hits">0</span></div>
                <div class="stat-line">BET: <span id="bet-counter">0/4</span> <strong id="recommended-unit">0U</strong></div>
                <button id="btn-history" class="history-trigger" data-t="btn_hist">HIST</button>
            </div>
        </aside>

        <div id="analysis-modal" class="modal-overlay hidden">
            <div class="modal-content">
                <header class="modal-header">
                    <h2 data-t="analysis_title"></h2>
                    <button id="close-analysis" class="close-btn">&times;</button>
                </header>
                <div class="analysis-summary" id="analysis-summary"></div>
                <div class="master-ai-inner">
                    <table class="analysis-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th data-t="th_miss"></th>
                                <th data-t="th_profit"></th>
                                <th data-t="th_rate"></th>
                            </tr>
                        </thead>
                        <tbody id="analysis-body"></tbody>
                    </table>
                </div>
                <div class="modal-footer" style="padding: 15px; display: flex; gap: 10px;">
                    <button id="btn-export" class="tool-btn" style="flex: 1;" data-t="btn_export"></button>
                    <button id="btn-import-trigger" class="tool-btn" style="flex: 1;" data-t="btn_import"></button>
                    <input type="file" id="import-file" class="hidden" accept=".json" style="display:none;">
                </div>
            </div>
        </div>

        <main class="main-panel">
            <section class="install-banner hidden" id="install-banner">
                <div class="install-copy">
                    <strong data-t="install_title"></strong>
                    <span data-t="install_desc"></span>
                </div>
                <button id="btn-install" class="install-btn" type="button" data-t="btn_install"></button>
            </section>

            <section class="master-guide-area">
                <!-- \uc0c8\ub85c\uc6b4 7\uc778 \ud1b5\ud569 \ubd84\uc11d \ucc3d -->
                <div class="consensus-7-card" id="consensus-7-card">
                    <div class="c7-header">7\uc778 \ud1b5\ud569 \ubd84\uc11d</div>
                    <div class="c7-info">
                        <span id="c7-streak-badge" class="c7-streak">-</span>
                        <span id="c7-consensus-count" class="c7-count">WAIT</span>
                    </div>
                    <div class="c7-result" id="c7-recommendation">NEXT: -</div>
                </div>

                <!-- \uae30\uc804 AI \ub9c8\uc2a4\ud130 \ubd84\uc11d \ucc3d -->
                <div class="guide-card" id="guide-card">
                    <div class="strategy-selector" id="strategy-selector">
                        <button class="strat-btn" data-mode="optimal">OPTIMAL</button>
                        <button class="strat-btn" data-mode="ai">AI SMART</button>
                        <button class="strat-btn" data-mode="backup">BACKUP</button>
                        <button class="strat-btn" data-mode="vertical" data-t="strat_vertical">VERTICAL</button>
                        <button class="strat-btn active" data-mode="total">TOTAL</button>
                    </div>
                    <div class="guide-label" id="ai-label" data-t="guide_wait"></div>
                    <div class="analysis-badge" id="ai-mode-badge" data-t="badge_wait"></div>
                    <div class="guide-result" id="master-recommendation">NEXT: -</div>
                </div>
            </section>

            <section class="grid-area" id="prediction-grid"></section>

            <footer class="action-bar">
                <div class="row-indicator">R<b id="current-row-num">1</b></div>
                <div class="control-btns">
                    <button id="btn-zen" class="tool-btn" data-t="ic_zen"></button>
                    <button id="btn-reload" class="tool-btn" data-t="ic_reload"></button>
                    <button id="btn-undo" class="tool-btn" data-t="ic_undo"></button>
                    <button id="btn-reset" class="tool-btn danger" data-t="ic_reset"></button>
                </div>
                <div class="input-hub">
                    <button class="btn-input p-btn" data-val="P" id="btn-p">P</button>
                    <button class="btn-input b-btn" data-val="B" id="btn-b">B</button>
                </div>
            </footer>
        </main>
    </div>

    <div id="hit-notification" class="hit-overlay hidden" data-t="hit_overlay"></div>
    <div id="streak-badge" class="streak-fire hidden"></div>

    <script src="js/config.js?v=5.0.0"></script>
    <script src="js/state.js?v=5.0.0"></script>
    <script src="js/predictor.js?v=5.0.0"></script>
    <script src="js/ui.js?v=5.0.0"></script>
    <script src="js/app.js?v=5.0.0"></script>
    <!-- v5.0.0 PWA Optimized Architecture -->
</body>
</html>
