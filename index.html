<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>PB Master v3.5</title>
    <meta name="description" content="Android-ready PB pattern dashboard with offline install support.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#07090e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div class="app-container">
        <!-- Dashboard Sidebar (Left 25%) -->
        <aside class="side-panel">
            <div class="status-badge" id="safety-status">
                <span id="status-text">кҙҖл§?мӨ?/span>
            </div>
            
            <div class="routine-list" id="routine-board">
                <!-- 5 Routines Mini Cards -->
                <div class="mini-rt" data-rid="1"><span>??/span> <b id="rt-p-1">-</b> <div class="rt-metrics"><i id="rt-h-1">0</i><em id="rt-m-1">0</em></div></div>
                <div class="mini-rt" data-rid="2"><span>??/span> <b id="rt-p-2">-</b> <div class="rt-metrics"><i id="rt-h-2">0</i><em id="rt-m-2">0</em></div></div>
                <div class="mini-rt" data-rid="3"><span>X</span> <b id="rt-p-3">-</b> <div class="rt-metrics"><i id="rt-h-3">0</i><em id="rt-m-3">0</em></div></div>
                <div class="mini-rt" data-rid="4"><span>??/span> <b id="rt-p-4">-</b> <div class="rt-metrics"><i id="rt-h-4">0</i><em id="rt-m-4">0</em></div></div>
                <div class="mini-rt" data-rid="5"><span>дё?/span> <b id="rt-p-5">-</b> <div class="rt-metrics"><i id="rt-h-5">0</i><em id="rt-m-5">0</em></div></div>
            </div>

            <div class="hud-stats">
                <div class="stat-line">ACC: <span id="overall-accuracy">0%</span></div>
                <div class="stat-line">DIRECT: <span id="step1-hits">0</span></div>
                <div class="stat-line">BET: <span id="bet-counter">0/4</span> <strong id="recommended-unit">0U</strong></div>
                <button id="btn-history" class="history-trigger">HIST</button>
            </div>
        </aside>

        <!-- Analysis Modal -->
        <div id="analysis-modal" class="modal-overlay hidden">
            <div class="modal-content">
                <header class="modal-header">
                    <h2>?ҲмҠӨ? лҰ¬ л¶„м„қ ?ҲнҸ¬??/h2>
                    <button id="close-analysis" class="close-btn">&times;</button>
                </header>
                <div class="analysis-summary" id="analysis-summary">
                    <!-- Summary cards here -->
                </div>
                <div class="master-ai-inner">
                    <table class="analysis-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>мөңл? лҜёмҠӨ</th>
                                <th>?җмқө (Unit)</th>
                                <th>?№лҘ </th>
                            </tr>
                        </thead>
                        <tbody id="analysis-body">
                            <!-- Rows here -->
                        </tbody>
                    </table>
                </div>
                <div class="modal-footer" style="padding: 15px; display: flex; gap: 10px; border-top: 1px solid rgba(255,255,255,0.1);">
                    <button id="btn-export" class="tool-btn" style="flex: 1;">л°ұм—… ?Җ??/button>
                    <button id="btn-import-trigger" class="tool-btn" style="flex: 1;">л°ұм—… л¶Ҳлҹ¬?Өкё°</button>
                    <input type="file" id="import-file" class="hidden" accept=".json" style="display:none;">
                </div>
            </div>
        </div>


        <!-- Main Operation Area (Right 75%) -->
        <main class="main-panel">
            <section class="install-banner hidden" id="install-banner">
                <div class="install-copy">
                    <strong>?Ҳл“ңлЎңмқҙ???Өм№ҳ к°Җ??/strong>
                    <span>???”л©ҙ??м¶”к??ҙм„ң ?ұмІҳ???Өн–ү?ҳм„ё??</span>
                </div>
                <button id="btn-install" class="install-btn" type="button">?Өм№ҳ</button>
            </section>

            <!-- Master Guide (Center Top) -->
            <section class="master-guide-area">
                <div class="guide-card" id="guide-card">
                    <div class="strategy-selector" id="strategy-selector">
                        <button class="strat-btn" data-mode="optimal" title="?ҳмқөк·№л???>OPTIMAL</button>
                        <button class="strat-btn" data-mode="ai" title="AI ?№лҘ кё°л°ҳ">AI SMART</button>
                        <button class="strat-btn" data-mode="dynamic" title="мөңкі  ?№лҘ  ?җлҸҷм¶”м Ғ">DYNAMIC</button>
                        <button class="strat-btn" data-mode="backup" title="кё°мЎҙ лЈЁнӢҙ">BACKUP</button>
                        <button class="strat-btn active" data-mode="total" title="?өн•© ?ӨмҲҳкІ?>TOTAL</button>
                    </div>
                    <div class="guide-label" id="ai-label">AI л§ҲмҠӨ???Җкё?мӨ?/div>
                    <div class="analysis-badge" id="ai-mode-badge">л¶„м • л¶„м„қ ?Җкё?/div>
                    <div class="guide-result" id="master-recommendation">NEXT: -</div>
                </div>
            </section>

            <!-- 20 Column Grid (Center) -->
            <section class="grid-area" id="prediction-grid">
                <!-- Columns here -->
            </section>

            <!-- Action Toolbar (Bottom) -->
            <footer class="action-bar">
                <div class="row-indicator">R<b id="current-row-num">1</b></div>
                <div class="control-btns">
                    <button id="btn-zen" class="tool-btn" title="?¬м»Ө??лӘЁл“ң">?”Қ</button>
                    <button id="btn-reload" class="tool-btn">?”„</button>
                    <button id="btn-undo" class="tool-btn">??/button>
                    <button id="btn-reset" class="tool-btn danger">??/button>
                </div>
                <div class="input-hub">
                    <button class="btn-input p-btn" data-val="P" id="btn-p">P</button>
                    <button class="btn-input b-btn" data-val="B" id="btn-b">B</button>
                </div>
            </footer>
        </main>
    </div>

    <!-- Victory Overlay -->
    <div id="hit-notification" class="hit-overlay hidden">?ҺҜ HIT!</div>
    <!-- PWA Streak Badge -->
    <div id="streak-badge" class="streak-fire hidden">?”Ҙ 0</div>

    <script src="script_v8.js"></script>
</body>
</html>
