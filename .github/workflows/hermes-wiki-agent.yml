name: 🤖 AI Wiki Agent
on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  triage:
    if: |
      (github.event_name == 'issues' && github.event.action == 'opened') ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'ai-agent'))
    runs-on: ubuntu-24.04
    outputs:
      decision: ${{ steps.triage.outputs.decision }}
      issue_title: ${{ steps.triage.outputs.issue_title }}
      issue_number: ${{ steps.triage.outputs.issue_number }}

    steps:
      - uses: actions/checkout@v4

      - id: triage
        run: |
          echo "decision=resolve" >> "$GITHUB_OUTPUT"
          echo "issue_title=${{ github.event.issue.title }}" >> "$GITHUB_OUTPUT"
          echo "issue_number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"

      - name: Add 🤖 processing label
        uses: actions-ecosystem/action-add-labels@v1
        with:
          labels: "🤖 processing"

  resolve:
    needs: triage
    if: needs.triage.outputs.decision == 'resolve'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --quiet openai PyGithub pyyaml

      - name: 🤖 AI Agent resolving issue
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ needs.triage.outputs.issue_number }}
        run: |
          python3 << 'PYEOF'
          import os, json, github, openai, subprocess
          from pathlib import Path

          gh = github.Github(os.environ["GITHUB_TOKEN"])
          repo = gh.get_repo(os.environ["GITHUB_REPOSITORY"])
          issue = repo.get_issue(int(os.environ["ISSUE_NUMBER"]))
          client = openai.OpenAI(api_key=os.environ["OPENAI_API_KEY"])

          # 저장소 구조 파악
          repo_tree = []
          for root, dirs, files in os.walk("."):
              if ".git" in root or ".obsidian" in root or "__pycache__" in root:
                  continue
              level = root.replace(".", "").count(os.sep)
              indent = " " * level
              repo_tree.append(f"{indent}{os.path.basename(root)}/")
              for f in sorted(files[:5]):
                  repo_tree.append(f"{indent}  {f}")

          context = f"""## Issue #{issue.number}: {issue.title}
          {issue.body}

          ## Repository Structure
          {' '.join(repo_tree[:80])}
          """

          # AI 호출
          response = client.chat.completions.create(
              model="gpt-4o",
              messages=[
                  {"role": "system", "content": "You are an AI that resolves GitHub issues. "
                  "Analyze the issue, read relevant files, and create a PR with the fix. "
                  "Respond with: 1) Analysis 2) Plan 3) Changes to make"},
                  {"role": "user", "content": context}
              ]
          )

          analysis = response.choices[0].message.content
          issue.create_comment(f"🤖 **AI Analysis Complete**\n\n{analysis}\n\n---\n*Powered by Hermes Wiki Agent*")

          # 완료 라벨
          issue.remove_from_labels("🤖 processing")
          issue.add_to_labels("✅ resolved")
          print(f"Issue #{issue.number} resolved by AI Agent")
          PYEOF

      - name: Commit and create PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="ai/issue-${{ needs.triage.outputs.issue_number }}"
          git config user.email "hermes-agent@users.noreply.github.com"
          git config user.name "Hermes Wiki Agent"
          git checkout -b "$BRANCH"
          git add -A
          git diff --cached --quiet || git commit -m "🤖 AI auto-fix for #${{ needs.triage.outputs.issue_number }}"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "🤖 AI: ${{ needs.triage.outputs.issue_title }}" \
            --body "Auto-generated by Hermes Wiki Agent 🤖\n\nCloses #${{ needs.triage.outputs.issue_number }}" \
            --label "🤖 ai-generated"
