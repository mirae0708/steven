name: Daily Note Auto Create
on:
  schedule:
    - cron: '0 0 * * *'
jobs:
  create-daily-note:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Create Daily Note
        run: |
          DATE=$(date +'%Y-%m-%d')
          mkdir -p 03-Meetings
          echo "---\ncreated: $DATE\ntags: daily\n---\n\n# $DATE Daily Note\n\n## Today’s Goals\n- \n\n## Claude가 도와줄 일\n- \n\n## Meeting / Code Changes\n- \n\n## Links\n- [[Previous Day]]\n" > 03-Meetings/Daily-$DATE.md
      - name: Commit & Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add 03-Meetings/Daily-*.md
          git commit -m "Auto-create daily note"
          git push
